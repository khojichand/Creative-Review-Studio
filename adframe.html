<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: transparent; }
  #richmedia_1 { position: relative; width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="richmedia_1"></div>
<script>
  // ============================
  // PRODUCT ID MAP
  // Maps VDX product name → productId used by tags.js
  // ============================
  const PRODUCT_IDS = {
    VdxDesktopInframe:    2,
    VdxDesktopExpandable: 14,
    VdxDesktopInstream:   3,
    VdxDesktopInread:     6,
    VdxMobileInframe:     5,
    VdxMobileExpandable:  15,
    VdxMobileInstream:    41,
    VdxMobileInread:      43,
    OTT:                  50
  };

  // ============================
  // PARSE URL PARAMS
  // ============================
  const p = new URLSearchParams(location.search);

  const product            = p.get("product")             || "";
  const size               = p.get("size")                || "";
  const mediaDataID        = p.get("mediaDataID")         || "";
  const ccRevision         = p.get("ccRevision")          || "";
  const ccRevisionVariation = parseInt(p.get("ccRevisionVariation") || "0");
  const clientID           = p.get("clientID")            || "293233";
  const frameworkVersion   = p.get("frameworkVersion")    || "3.15.0";

  if (!mediaDataID || !ccRevision || !product || !size) {
    document.body.innerHTML = '<div style="padding:16px;color:#999;font-family:Arial;font-size:12px;">Missing required params: mediaDataID, ccRevision, product, size</div>';
  } else {
    // ============================
    // BUILD e9 OBJECT
    // ============================
    var e9 = {
      adformat:                    product,
      size:                        size,
      noAd:                        1,
      clientID:                    clientID,
      playTrackURL:                "https://",
      clickTrackURL:               "https://",
      flushMedia:                  1,
      mediaType:                   8,
      adApp:                       1,
      mediaDataID:                 mediaDataID,
      productId:                   PRODUCT_IDS[product] || 2,
      mediaDir:                    mediaDataID,
      ccRevisionVariation:         ccRevisionVariation,
      ccRevision:                  ccRevision,
      vdxFrameworkTemplateVersion: frameworkVersion,
      mediaID:                     0,
      isByPassCrossDomain:         false,
      fragmentedVideo:             { enabled: false },
      elastic:                     undefined,
      tagparams: {
        productControlConfig: {
          productName:             product,
          isBokehModeEnabled:      true,
          isTurnOffTabAutoSwitch:  true,
          isPlayFragmentedVideo:   false
        },
        renderingenv: "showcase",
        productcontrolconfig: {
          isofftabautoswitch: { enabled: true }
        }
      },
      adContainerId: "richmedia_1",
      environment:   "prod"
    };
  }
</script>
<script src="https://a.tribalfusion.com/tags/AdApp/ads/tags.js"></script>
</body>
</html>
